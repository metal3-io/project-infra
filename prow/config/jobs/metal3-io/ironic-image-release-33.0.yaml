presubmits:
  metal3-io/ironic-image:
  - name: shellcheck
    branches:
    - release-33.0
    run_if_changed: '((\.sh)|^Makefile)$'
    decorate: true
    spec:
      containers:
      - args:
        - ./hack/shellcheck.sh
        command:
        - sh
        env:
        - name: IS_CONTAINER
          value: "TRUE"
        image: docker.io/koalaman/shellcheck-alpine:v0.11.0@sha256:9955be09ea7f0dbf7ae942ac1f2094355bb30d96fffba0ec09f5432207544002
        imagePullPolicy: Always
  - name: markdownlint
    branches:
    - release-33.0
    run_if_changed: '(\.md|markdownlint\.sh)$'
    decorate: true
    spec:
      containers:
      - args:
        - ./hack/markdownlint.sh
        command:
        - sh
        env:
        - name: IS_CONTAINER
          value: "TRUE"
        image: docker.io/pipelinecomponents/markdownlint-cli2:0.14.19@sha256:c651559a31fefc82cf864486d9472338ffa0aaa529ebf71a035d4f1d913809aa
        imagePullPolicy: Always
  # name: {job_prefix}-{image_os}-e2e-integration-test-{capm3_target_branch}
  - name: metal3-centos-e2e-integration-test-release-1-12
    branches:
    - release-33.0
    agent: jenkins
    always_run: false
    optional: false
  - name: metal3-ubuntu-e2e-integration-test-release-1-12
    branches:
    - release-33.0
    agent: jenkins
    always_run: false
    optional: false
  - name: metal3-dev-env-integration-test-centos-release-1-12
    branches:
    - release-33.0
    agent: jenkins
    always_run: false
    optional: true
  - name: metal3-dev-env-integration-test-ubuntu-release-1-12
    branches:
    - release-33.0
    agent: jenkins
    always_run: false
    optional: true
